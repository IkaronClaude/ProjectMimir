# Nginx reverse proxy for Mimir game server
# Install: apt install nginx
# Deploy: cp this file to /etc/nginx/sites-available/fiesta && ln -s ../sites-available/fiesta /etc/nginx/sites-enabled/
# Reload: nginx -t && systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain (e.g. fiesta.ikaron.uk)
# Adjust ports if you used PORT_OFFSET in .mimir-deploy.env

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Patch server — client downloads patches from here
    location /patch/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API server — account registration, admin tools
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Web app — root serves the webapp (registration page, etc.)
    location / {
        proxy_pass http://127.0.0.1:8088/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
